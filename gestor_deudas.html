<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Deudas - Mis Clientes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 30px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .upload-section { background: #e8f0fe; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .client-card { border: 1px solid #e0e0e0; padding: 20px; margin-top: 20px; border-radius: 10px; background: #fff; transition: 0.3s; }
        .client-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .total-deuda { font-size: 1.4em; font-weight: bold; color: #d93025; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8f9fa; color: #5f6368; font-weight: 600; text-transform: uppercase; font-size: 0.8em; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-ws { background: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: bold; margin-top: 15px; }
        .btn-ws:hover { background: #128C7E; }
    </style>
</head>
<body>

<div class="container">
    <h2>Resumen de Cuentas Corrientes</h2>
    <div class="upload-section">
        <p>Selecciona tu archivo de Excel para procesar los saldos</p>
        <input type="file" id="upload" accept=".xlsx, .xls">
    </div>
    <div id="result"></div>
</div>

<script>
    document.getElementById('upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheetName = workbook.SheetNames[0];
            // header: 1 nos da un array de arrays (filas y columnas por letra)
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {header: 1});

            const resumen = {};

            // Empezamos desde la fila 1 para saltar el encabezado
            for (let i = 1; i < rows.length; i++) {
                const fila = rows[i];
                if (!fila[0]) continue; // Salta si no hay nombre de cliente

                const nombre = fila[0]; // Columna A
                const totalFactura = parseFloat(fila[4]) || 0; // Columna E
                const pagoParcial = parseFloat(fila[5]) || 0;  // Columna F
                const saldoPendiente = parseFloat(fila[6]) || 0; // Columna G

                if (!resumen[nombre]) {
                    resumen[nombre] = { deudaTotal: 0, detalles: [] };
                }
                
                resumen[nombre].deudaTotal += saldoPendiente;
                resumen[nombre].detalles.push({
                    original: totalFactura,
                    pago: pagoParcial,
                    saldo: saldoPendiente
                });
            }

            renderizar(resumen);
        };
        reader.readAsArrayBuffer(file);
    });

    function renderizar(datos) {
        const div = document.getElementById('result');
        div.innerHTML = '';

        for (const cliente in datos) {
            const info = datos[cliente];
            if (info.deudaTotal <= 0) continue; // No mostrar si no debe nada

            let tablaDetalle = `<table>
                <tr>
                    <th>Total Factura</th>
                    <th>Pago Realizado</th>
                    <th>Saldo Pendiente</th>
                </tr>`;
            
            info.detalles.forEach(d => {
                tablaDetalle += `<tr>
                    <td>$${d.original.toLocaleString()}</td>
                    <td>$${d.pago.toLocaleString()}</td>
                    <td>$${d.saldo.toLocaleString()}</td>
                </tr>`;
            });
            tablaDetalle += `</table>`;

            const textoMensaje = `Hola ${cliente}, te envío el detalle de tu saldo pendiente. El total adeudado a la fecha es de $${info.deudaTotal.toLocaleString()}.`;
            const urlWs = `https://wa.me/?text=${encodeURIComponent(textoMensaje)}`;

            div.innerHTML += `
                <div class="client-card">
                    <h3>${cliente}</h3>
                    <div class="total-deuda">Deuda Total: $${info.deudaTotal.toLocaleString()}</div>
                    ${tablaDetalle}
                    <a class="btn-ws" href="${urlWs}" target="_blank">📲 Compartir Saldo por WhatsApp</a>
                </div>
            `;
        }
    }
</script>

</body>
</html>
