<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Cobranzas - Copiar Imagen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --blue: #1e40af; --green: #25d366; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .ticket-wrap { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ticket-capture { background: white; padding: 15px; border: 1px solid #eee; }
        .ticket-header { border-bottom: 2px solid var(--blue); margin-bottom: 10px; text-align: center; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin: 10px 0; }
        th, td { text-align: left; padding: 5px; border-bottom: 1px solid #f1f5f9; }
        .total-box { background: #1e293b; color: white; padding: 10px; border-radius: 5px; text-align: center; font-size: 1.5rem; font-weight: bold; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-copy { background: var(--green); color: white; }
        .btn-adj { background: #94a3b8; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 Envío de Cobranzas</h1>
        <div class="upload-area" onclick="document.getElementById('upload').click()">
            <strong>📂 Cargar Excel</strong>
            <input type="file" id="upload" accept=".xlsx, .xls" style="display:none">
        </div>
    </div>
    <div id="result" class="grid"></div>
</div>

<script>
    let storage = {};

    document.getElementById('upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            storage = {};
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (r[0] && (parseFloat(r[6]) > 0)) {
                    if (!storage[r[0]]) storage[r[0]] = { bruto: 0, desc: 0, items: [] };
                    storage[r[0]].bruto += parseFloat(r[6]);
                    storage[r[0]].items.push({ t: r[4], p: r[5], s: r[6] });
                }
            }
            render();
        };
        reader.readAsArrayBuffer(file);
    });

    function setRecibo(name) {
        const val = prompt(`Monto de recibo para ${name}:`, "0");
        if (val !== null) { storage[name].desc = parseFloat(val) || 0; render(); }
    }

    async function copiarImagen(id) {
        const area = document.getElementById(id);
        const canvas = await html2canvas(area);
        canvas.toBlob(blob => {
            const item = new ClipboardItem({ "image/png": blob });
            navigator.clipboard.write([item]).then(() => {
                alert("¡Imagen copiada! Ahora andá a WhatsApp y pegala (Ctrl+V)");
            });
        });
    }

    function render() {
        const grid = document.getElementById('result');
        grid.innerHTML = '';
        Object.keys(storage).sort().forEach((nom, i) => {
            const info = storage[nom];
            const capId = `cap-${i}`;
            grid.innerHTML += `
                <div class="ticket-wrap">
                    <div id="${capId}" class="ticket-capture">
                        <div class="ticket-header">RESUMEN DE CUENTA</div>
                        <div style="font-size:0.8rem"><strong>Cliente:</strong> ${nom}</div>
                        <table>
                            <tr><th>Fact.</th><th>Pago</th><th>Saldo</th></tr>
                            ${info.items.map(item => `<tr><td>$${item.t}</td><td>$${item.p}</td><td>$${item.s}</td></tr>`).join('')}
                        </table>
                        ${info.desc > 0 ? `<div style="color:red; font-size:0.7rem; text-align:right">Recibo: -$${info.desc}</div>` : ''}
                        <div class="total-box">$${(info.bruto - info.desc).toLocaleString()}</div>
                    </div>
                    <button class="btn btn-adj" onclick="setRecibo('${nom}')">✏️ Ajustar Recibo</button>
                    <button class="btn btn-copy" onclick="copiarImagen('${capId}')">📋 COPIAR PARA PEGAR EN WS</button>
                </div>`;
        });
    }
</script>
</body>
</html>
