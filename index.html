<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App de Colecciones</title>
    <style>
        :root { --primary: #0288d1; --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #2e7d32; --whatsapp: #25d366; --error: #d32f2f; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; }
        
        #main-app { display: none; max-width: 500px; margin: auto; }
        .btn-tipo { background: var(--card); padding: 40px 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; font-size: 22px; font-weight: bold; cursor: pointer; border: 1px solid #333; }
        
        .album-card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #333; cursor: pointer; }
        .album-card img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; background: #222; }
        
        /* Barra de Progreso */
        .prog-container { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--primary); transition: width 0.5s; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .nro { background: #1e1e1e; padding: 15px 0; text-align: center; border-radius: 6px; color: #ff5252; border: 1px solid #444; font-weight: bold; cursor: pointer; animation: fadeIn 0.3s; }
        .nro.tengo { background: var(--accent); color: white; border-color: #fff; opacity: 0.5; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .btn-accion { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-share { background: var(--whatsapp); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-back { background: #444; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
        
        .toggle-show { background: none; border: 1px solid #444; color: #666; width: 100%; padding: 10px; border-radius: 8px; margin-top: 40px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="color:var(--primary)">MI COLECCIÓN</h1>
        <p>Cargando tus faltantes...</p>
    </div>

    <div id="main-app"></div>

    <script>
        const CATALOGO = [
            { id: "f26", nombre: "FIFA 365 2026", total: 630, tipo: "Carta", img: "https://m.media-amazon.com/images/I/71C7x6y-G9L._AC_SL1500_.jpg" },
            { id: "ca24", nombre: "Copa América 2024", total: 430, tipo: "Figurita", img: "https://exitocol.vtexassets.com/arquivos/ids/22373752/Album-Copa-America-2024-Panini.jpg" }
        ];

        let db = JSON.parse(localStorage.getItem('colecciones_v5')) || [];
        let tipoActual = "";
        let mostrarObtenidas = false;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                renderInicio();
            }, 1200);
        };

        function renderInicio() {
            document.getElementById('main-app').innerHTML = `
                <h1 style="text-align:center; margin-top:50px">Mis Álbumes</h1>
                <div class="btn-tipo" onclick="setTipo('Carta')">🃏 CARTAS</div>
                <div class="btn-tipo" onclick="setTipo('Figurita')">⚽ FIGURITAS</div>
            `;
        }

        function setTipo(t) { tipoActual = t; renderMenu(); }

        function renderMenu() {
            const filtrados = db.filter(a => a.tipo === tipoActual);
            let html = `<button class="btn-back" onclick="renderInicio()">⬅ Volver</button>
                        <h2>${tipoActual}s</h2>
                        <button class="btn-accion" style="background:#1b5e20" onclick="renderNuevoForm()">+ AGREGAR NUEVA</button><br><br>`;
            
            filtrados.forEach(a => {
                const totalFaltan = a.total - a.tengo.length;
                const porcFaltante = Math.floor((totalFaltan / a.total) * 100);
                const porcLleno = 100 - porcFaltante;

                html += `
                    <div class="album-card" onclick="verAlbum('${a.id}')">
                        <img src="${a.img || 'https://via.placeholder.com/70?text=Album'}">
                        <div style="flex:1">
                            <strong>${a.nombre}</strong><br>
                            <small style="color:var(--error)">Faltan el ${porcFaltante}% (${totalFaltan} unidades)</small>
                            <div class="prog-container"><div class="prog-fill" style="width:${porcLleno}%"></div></div>
                        </div>
                    </div>`;
            });
            document.getElementById('main-app').innerHTML = html;
        }

        function renderNuevoForm() {
            let html = `
                <button class="btn-back" onclick="renderMenu()">⬅ Volver</button>
                <div style="background:#252525; padding:20px; border-radius:15px; border:1px solid var(--primary); margin-bottom:20px">
                    <h3>Nueva Colección</h3>
                    <input type="text" id="custom-nombre" placeholder="Nombre" style="width:100%; padding:12px; margin-bottom:10px; background:#111; border:1px solid #444; color:white; border-radius:5px">
                    <input type="number" id="custom-total" placeholder="Cantidad de cartas" style="width:100%; padding:12px; margin-bottom:10px; background:#111; border:1px solid #444; color:white; border-radius:5px">
                    <button class="btn-accion" onclick="guardarPersonalizada()">CREAR AHORA</button>
                </div>`;
            document.getElementById('main-app').innerHTML = html;
        }

        function guardarPersonalizada() {
            const nombre = document.getElementById('custom-nombre').value;
            const total = parseInt(document.getElementById('custom-total').value);
            if(!nombre || !total) return;
            db.push({ id: "c_" + Date.now(), nombre, total, tipo: tipoActual, img: "", tengo: [] });
            localStorage.setItem('colecciones_v5', JSON.stringify(db));
            renderMenu();
        }

        function verAlbum(id) {
            const a = db.find(x => x.id === id);
            const faltan = [];
            const tengo = [];
            for(let i=1; i<=a.total; i++) {
                if(a.tengo.includes(i)) tengo.push(i);
                else faltan.push(i);
            }

            let html = `
                <div style="position:sticky; top:0; background:var(--bg); padding-bottom:10px; z-index:10">
                    <button class="btn-back" onclick="renderMenu()">⬅ Volver</button>
                    <h2 style="margin:0">${a.nombre}</h2>
                    <p style="color:#ff5252; margin: 5px 0;"><b>Faltantes: ${faltan.length}</b></p>
                    <button class="btn-share" onclick="compartirFaltantes('${a.id}')">Compartir Faltantes (WhatsApp)</button>
                </div>

                <div class="grid">
                    ${faltan.map(n => `<div class="nro" onclick="toggle('${id}', ${n})">${n}</div>`).join('')}
                </div>`;

            if(mostrarObtenidas && tengo.length > 0) {
                html += `
                    <p style="margin-top:40px; color:var(--accent)">YA OBTENIDAS:</p>
                    <div class="grid">
                        ${tengo.map(n => `<div class="nro tengo" onclick="toggle('${id}', ${n})">${n}</div>`).join('')}
                    </div>`;
            }

            html += `<button class="toggle-show" onclick="toggleVista('${id}')">
                        ${mostrarObtenidas ? 'Ocultar las que ya tengo' : 'Revisar las que ya tengo'}
                     </button>`;

            document.getElementById('main-app').innerHTML = html;
            window.scrollTo(0,0);
        }

        function toggleVista(id) {
            mostrarObtenidas = !mostrarObtenidas;
            verAlbum(id);
        }

        function toggle(id, n) {
            const a = db.find(x => x.id === id);
            const idx = a.tengo.indexOf(n);
            if(idx > -1) a.tengo.splice(idx, 1);
            else a.tengo.push(n);
            localStorage.setItem('colecciones_v5', JSON.stringify(db));
            verAlbum(id);
        }

        function compartirFaltantes(id) {
            const a = db.find(x => x.id === id);
            const faltan = [];
            for(let i=1; i<=a.total; i++) { if(!a.tengo.includes(i)) faltan.push(i); }
            if(faltan.length === 0) return alert("¡Completado!");
            const texto = `Me faltan estas de ${a.nombre}:\n\n` + faltan.join(", ");
            window.open("https://wa.me/?text=" + encodeURIComponent(texto), '_blank');
        }
    </script>
</body>
</html>
