<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Digital</title>
    <style>
        :root {
            --primary: #0288d1;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #1e1e1e 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s;
        }

        .logo-anim {
            font-size: 60px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* Menú y Cards */
        .container {
            max-width: 500px;
            margin: auto;
            display: none;
        }

        .visible {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .btn-tipo {
            background: var(--card);
            padding: 40px 20px;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .album-card {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
        }

        .album-card img {
            width: 80px;
            height: 80px;
            object-fit: cover;
        }

        .album-info {
            padding: 10px 15px;
            flex: 1;
        }

        /* Barra de Progreso */
        .prog-bg {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            margin-top: 8px;
        }

        .prog-fill {
            height: 100%;
            background: #4caf50;
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* Grilla de Números */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 15px;
        }

        .nro {
            background: #1e1e1e;
            padding: 12px 0;
            text-align: center;
            border-radius: 6px;
            border: 1px solid #444;
            color: #ff5252;
            font-weight: bold;
            cursor: pointer;
        }

        .nro.tengo {
            background: #2e7d32;
            color: white;
            border-color: #fff;
        }

        /* UI */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-back {
            background: #333;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-add {
            background: #1b5e20;
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
        }

        /* Selector Catálogo */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            padding: 20px;
            z-index: 2000;
        }

        select {
            width: 100%;
            padding: 15px;
            background: #222;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div id="splash">
        <div class="logo-anim">🃏⚽</div>
        <h2 style="letter-spacing:2px;">BIENVENIDO A TU</h2>
        <h1 style="color:var(--primary); font-style:italic;">&Aacute;**** DIGITAL</h1>
    </div>
    <div class="container" id="main-app"><br></div>
    <div id="modal">
        <h3>Eleg&iacute; una colecci&oacute;n</h3><button class="btn-add" onclick="agregarDeCatalogo()">AGREGAR AHORA</button> <button class="btn-back" onclick="cerrarModal()" style="width:100%;">Cancelar</button>
    </div>
    <script>
        // --- TU CATÁLOGO DE FÚTBOL ---
        const CATALOGO = [
            { id: "fifa26", nombre: "FIFA 365 2026", total: 630, tipo: "Carta", img: "https://m.media-amazon.com/images/I/71C7x6y-G9L._AC_SL1500_.jpg" },
            { id: "copa24", nombre: "Copa América 2024", total: 430, tipo: "Figurita", img: "https://exitocol.vtexassets.com/arquivos/ids/22373752/Album-Copa-America-2024-Panini.jpg" },
            { id: "lpf24", nombre: "Liga Profesional 2024", total: 528, tipo: "Figurita", img: "https://cloudfront-us-east-1.images.arcpublishing.com/infobae/T7XNVN2GIBH3NIXYV2P5Y7I47E.jpg" }
        ];
        
        let db = JSON.parse(localStorage.getItem('mis_colecciones')) || [];
        let tipoActual = "";
        
        // Inicio
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('main-app').classList.add('visible');
                    renderInicio();
                }, 800);
            }, 2000);
        };
        
        function renderInicio() {
            document.getElementById('main-app').innerHTML = `
                <div style="padding-top:15vh">
                    <h2 style="text-align:center">¿Qué vas a organizar?</h2>
                    <div class="btn-tipo" onclick="setTipo('Carta')">🃏 MIS CARTAS</div>
                    <div class="btn-tipo" onclick="setTipo('Figurita')">⚽ MIS FIGURITAS</div>
                </div>`;
        }
        
        function setTipo(t) { tipoActual = t; renderMenu(); }
        
        function renderMenu() {
            const filtrados = db.filter(a => a.tipo === tipoActual);
            let html = `
                <button class="btn-back" onclick="renderInicio()">⬅ Inicio</button>
                <h2>Mis ${tipoActual}s</h2>
                <button class="btn-add" onclick="abrirModal()">+ ******* Colección</button>`;
        
            filtrados.forEach(a => {
                const porcentaje = Math.floor((a.obtenidas.length / a.total) * 100);
                html += `
                    <div class="album-card" onclick="renderDetalle('${a.id}')">
                        <img src="${a.img}">
                        <div class="album-info">
                            <strong>${a.nombre}</strong><br>
                            <small>${a.obtenidas.length} de ${a.total} coleccionadas</small>
                            <div class="prog-bg"><div class="prog-fill" style="width:${porcentaje}%"></div></div>
                        </div>
                    </div>`;
            });
            document.getElementById('main-app').innerHTML = html;
        }
        
        function renderDetalle(id) {
            const album = db.find(a => a.id === id);
            let html = `
                <div class="header">
                    <button class="btn-back" onclick="renderMenu()">⬅ Volver</button>
                    <h3 style="margin:0">${album.nombre}</h3>
                </div>
                <p>Faltantes: ${album.total - album.obtenidas.length}</p>
                <div class="grid">`;
            
            *** (let i = 1; i <= album.total; i++) {
                const clase = album.obtenidas.includes(i) ? 'tengo' : '';
                html += `<div class="nro ${clase}" onclick="toggleNro('${id}', ${i})">${i}</div>`;
            }
            html += `</div>`;
            document.getElementById('main-app').innerHTML = html;
        }
        
        function toggleNro(albumId, nro) {
            const album = db.find(a => a.id === albumId);
            const index = album.obtenidas.indexOf(nro);
            if (index > -1) album.obtenidas.splice(index, 1);
            else album.obtenidas.push(nro);
            
            localStorage.setItem('mis_colecciones', JSON.stringify(db));
            renderDetalle(albumId);
        }
        
        function abrirModal() {
            const select = document.getElementById('select-catalogo');
            const opciones = CATALOGO.filter(c => c.tipo === tipoActual);
            select.innerHTML = opciones.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
            document.getElementById('modal').style.display = 'block';
        }
        
        function cerrarModal() { document.getElementById('modal').style.display = 'none'; }
        
        function agregarDeCatalogo() {
            const id = document.getElementById('select-catalogo').value;
            if (db.some(a => a.id === id)) return alert("Ya tenés esta colección");
            
            const item = CATALOGO.find(c => c.id === id);
            db.push({ ...item, obtenidas: [] });
            localStorage.setItem('mis_colecciones', JSON.stringify(db));
            cerrarModal();
            renderMenu();
        }
    </script>

</body>

</html>
