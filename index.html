<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App de Colecciones</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        
        /* SPLASH - Simplificado al máximo */
        #splash { 
            position: fixed; inset: 0; background: #000; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 99999; 
        }
        .logo { font-size: 70px; margin-bottom: 20px; }
        
        /* BOTÓN DE EMERGENCIA (Si el logo no se va solo) */
        #btn-entrar {
            margin-top: 20px; padding: 10px 20px; background: #0288d1; 
            color: white; border: none; border-radius: 5px; display: none;
        }

        /* CONTENIDO */
        #main-app { display: none; max-width: 500px; margin: auto; }
        .btn-tipo { 
            background: #1e1e1e; padding: 40px 20px; border-radius: 15px; 
            text-align: center; margin-bottom: 20px; font-size: 22px; 
            font-weight: bold; cursor: pointer; border: 1px solid #333;
        }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .nro { background: #1e1e1e; padding: 15px 0; text-align: center; border-radius: 5px; color: #ff5252; }
        .nro.tengo { background: #2e7d32; color: white; }
        .album-card { background: #1e1e1e; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px;}
        .album-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo">🃏⚽</div>
        <h1 style="color:#0288d1">CARGANDO...</h1>
        <button id="btn-entrar" onclick="quitarLogo()">ENTRAR A LA FUERZA</button>
    </div>

    <div id="main-app">
        </div>

    <script>
        // CATÁLOGO
        const CATALOGO = [
            { id: "f26", nombre: "FIFA 365 2026", total: 630, tipo: "Carta", img: "https://m.media-amazon.com/images/I/71C7x6y-G9L._AC_SL1500_.jpg" },
            { id: "ca24", nombre: "Copa América 2024", total: 430, tipo: "Figurita", img: "https://exitocol.vtexassets.com/arquivos/ids/22373752/Album-Copa-America-2024-Panini.jpg" }
        ];

        let db = JSON.parse(localStorage.getItem('colecciones_v3')) || [];
        let tipoActual = "";

        // FUNCIÓN CLAVE: Quita el logo
        function quitarLogo() {
            console.log("Quitando logo...");
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderInicio();
        }

        // AUTO-ENTRAR (A los 2 segundos)
        setTimeout(quitarLogo, 2000);

        // MOSTRAR BOTÓN DE EMERGENCIA (A los 5 segundos si falla el anterior)
        setTimeout(() => {
            document.getElementById('btn-entrar').style.display = 'block';
        }, 5000);

        function renderInicio() {
            document.getElementById('main-app').innerHTML = `
                <h2 style="text-align:center">¿Qué vas a organizar?</h2>
                <div class="btn-tipo" onclick="setTipo('Carta')">🃏 CARTAS</div>
                <div class="btn-tipo" onclick="setTipo('Figurita')">⚽ FIGURITAS</div>
            `;
        }

        function setTipo(t) {
            tipoActual = t;
            const filtrados = db.filter(a => a.tipo === t);
            let html = `<button onclick="renderInicio()">⬅ Volver</button><h2>Mis ${t}s</h2>`;
            
            if(filtrados.length === 0) {
                html += `<p>No tenés álbumes.</p>`;
                // Agregamos botón para sumar uno del catálogo rápido
                const opciones = CATALOGO.filter(c => c.tipo === t);
                opciones.forEach(c => {
                    html += `
                        <div class="album-card" onclick="agregar('${c.id}')">
                            <img src="${c.img}">
                            <div><strong>Agregar ${c.nombre}</strong></div>
                        </div>`;
                });
            } else {
                filtrados.forEach(a => {
                    html += `
                        <div class="album-card" onclick="verAlbum('${a.id}')">
                            <img src="${a.img}">
                            <div><strong>${a.nombre}</strong><br>${a.tengo.length}/${a.total}</div>
                        </div>`;
                });
            }
            document.getElementById('main-app').innerHTML = html;
        }

        function agregar(id) {
            const item = CATALOGO.find(c => c.id === id);
            db.push({...item, tengo: []});
            localStorage.setItem('colecciones_v3', JSON.stringify(db));
            setTipo(tipoActual);
        }

        function verAlbum(id) {
            const a = db.find(x => x.id === id);
            let html = `<button onclick="setTipo('${tipoActual}')">⬅ Volver</button><h3>${a.nombre}</h3><div class="grid">`;
            for(let i=1; i<=a.total; i++) {
                const clase = a.tengo.includes(i) ? 'tengo' : '';
                html += `<div class="nro ${clase}" onclick="toggle('${id}', ${i})">${i}</div>`;
            }
            html += `</div>`;
            document.getElementById('main-app').innerHTML = html;
        }

        function toggle(id, n) {
            const a = db.find(x => x.id === id);
            const idx = a.tengo.indexOf(n);
            if(idx > -1) a.tengo.splice(idx, 1);
            else a.tengo.push(n);
            localStorage.setItem('colecciones_v3', JSON.stringify(db));
            verAlbum(id);
        }
    </script>
</body>
</html>
