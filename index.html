<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L.T.A. - PRO</title>
    <style>
        :root { --primary: #ffffff; --bg: #000000; --card: #1a1a1a; --text: #ffffff; --accent: #2e7d32; --whatsapp: #25d366; --red: #ff5252; --blue: #2196F3; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s; }
        .logo-img { width: 80%; max-width: 300px; border-radius: 50%; border: 2px solid #333; }

        #login-screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 99998; padding: 30px; text-align: center; }

        #main-app { display: none; max-width: 500px; margin: auto; }
        
        .btn-tipo { background: var(--card); padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border: 1px solid #333; }
        
        .album-card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #333; cursor: pointer; position: relative; }
        
        .photo-edit { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #444; background: #222; position: relative; cursor: pointer; }
        .photo-edit::after { content: '📷'; position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; border-radius: 8px; }
        .photo-edit:hover::after { opacity: 1; }

        .prog-container { width: 100%; height: 5px; background: #333; border-radius: 3px; margin-top: 6px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); transition: width 0.5s; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .nro { background: #1a1a1a; padding: 12px 0; text-align: center; border-radius: 4px; color: var(--red); border: 1px solid #333; font-weight: bold; font-size: 11px; cursor: pointer; }
        .nro.tengo { background: var(--accent) !important; color: white !important; border-color: #fff !important; }
        .nro.oculto { display: none; }

        input, select { width: 100%; padding: 15px; background: #111; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        .btn-accion { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-share { background: var(--whatsapp); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-back { background: #222; color: #aaa; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        .btn-backup { background: #333; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 12px; width: 48%; cursor: pointer; }
        .delete-icon { position: absolute; top: 10px; right: 10px; color: #444; font-size: 14px; padding: 5px; }
        
        #search-cat { margin-bottom: 10px; border-color: var(--blue); }
        .btn-filter { background: var(--blue); color: white; border: none; padding: 8px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="https://raw.githubusercontent.com/martinfiore19-alt/mis-colecciones/main/logo.png" class="logo-img">
        <p style="margin-top:20px; color:#555; font-weight: bold;">LA TABERNA DE LOS ÁLBUMES</p>
    </div>

    <div id="login-screen">
        <img src="https://raw.githubusercontent.com/martinfiore19-alt/mis-colecciones/main/logo.png" style="width:100px; border-radius:50%; margin-bottom:20px;">
        <h2>¿CÓMO TE LLAMÁS?</h2>
        <input type="text" id="user-name-input" style="text-transform: uppercase;" placeholder="TU NOMBRE...">
        <button class="btn-accion" onclick="saveUser()">CONTINUAR</button>
    </div>

    <input type="file" id="photoInput" style="display:none" accept="image/*" onchange="handleFileSelect(event)">
    <div id="main-app"></div>

    <script>
        const DB_NAME = 'lta_pro_v3'; 
        const LOGO_URL = "https://raw.githubusercontent.com/martinfiore19-alt/mis-colecciones/main/logo.png";
        
        // --- CATÁLOGOS (Resumidos para el código, ya sabés que están todos) ---
        const RAW_CARTAS = [{ n: "Copa Mundial de la FIFA 2026 Adrenalyn XL", t: 630 }, { n: "FIFA 365: 2025-2026 Adrenalyn XL", t: 450 }, { n: "Copa Mundial de Clubes de la FIFA 2025. Adrenalyn XL", t: 387 }, { n: "FIFA 365 2024-2025 Adrenalyn XL", t: 441 }, { n: "Fútbol Argentino 2024 Adrenalyn XL", t: 538 }, { n: "FIFA 365 2023-2024 Adrenalyn XL", t: 441 }, { n: "Copa Mundial Femenina de la FIFA 2023. Adrenalyn XL", t: 375 }, { n: "Fútbol Argentino 2023. Adrenalyn XL", t: 536 }, { n: "FIFA 365: 2022-2023. Adrenalyn XL", t: 441 }, { n: "Clase Top 2021-2022. Adrenalyn XL", t: 438 }, { n: "Copa Mundial de la FIFA Qatar 2022. Adrenalyn XL", t: 495 }, { n: "Camino a la Copa Mundial de la FIFA Qatar 2022. Adrenalyn XL", t: 494 }, { n: "Fútbol Argentino 2021. Adrenalyn XL", t: 501 }, { n: "FIFA 365: 2020-2021. Adrenalyn XL", t: 398 }, { n: "Previa de la UEFA Euro 2020. Adrenalyn XL", t: 709 }, { n: "Fútbol Argentino 2020. Adrenalyn XL", t: 173 }, { n: "FIFA 365: 2019-2020. Adrenalyn XL", t: 550 }, { n: "FIFA 365: 2018-2019. Adrenalyn XL", t: 396 }, { n: "Copa Mundial de la FIFA Rusia 2018. Adrenalyn XL", t: 622 }, { n: "FIFA 365: 2017-2018. Adrenalyn XL", t: 573 }, { n: "Camino a la Copa Mundial de la FIFA Rusia 2018. Adrenalyn XL", t: 608 }, { n: "Fútbol Argentino 2017. Adrenalyn XL", t: 307 }, { n: "FIFA 365: 2016-2017. Adrenalyn XL", t: 703 }, { n: "Copa América Centenario. Estados Unidos 2016. Adrenalyn XL", t: 315 }, { n: "FIFA 365: 2015-2016. Adrenalyn XL", t: 491 }, { n: "Copa América. Chile 2015. Adrenalyn XL", t: 245 }, { n: "Copa Mundial de la FIFA Brasil 2014. Adrenalyn XL", t: 678 }, { n: "Liga de Campeones de la UEFA 2013-2014. Adrenalyn XL", t: 450 }, { n: "Camino a la Copa Mundial de la FIFA Brasil 2014. Adrenalyn XL", t: 278 }, { n: "Fútbol Argentino 2013. Adrenalyn XL", t: 350 }, { n: "Liga de Campeones de la UEFA 2012-2013. Adrenalyn XL", t: 555 }, { n: "Fútbol Argentino 2012. Adrenalyn XL", t: 350 }, { n: "Liga de Campeones de la UEFA 2011-2012. Adrenalyn XL", t: 412 }, { n: "Liga de Campeones de la UEFA 2010-2011. Adrenalyn XL", t: 500 }, { n: "Copa Mundial de la FIFA Sudáfrica 2010. Adrenalyn XL", t: 350 }, { n: "CONMEBOL: Libertadores y Sudamericana 2024. Adrenalyn XL", t: 383 }];

        const RAW_FIGUS = [{ n: "Liga de Campeones de la UEFA 2025-2026", t: 574 }, { n: "FIFA 365 2026", t: 660 }, { n: "UEFA Euro 2024", t: 1428 }, { n: "Copa Mundial de Clubes de la FIFA 2025", t: 558 }, { n: "UEFA Euro Francia 2016", t: 680 }, { n: "Fútbol Argentino 2025", t: 567 }, { n: "Fútbol Argentino 2024", t: 508 }, { n: "Fútbol Argentino 2023", t: 522 }, { n: "Fútbol Argentino 2022", t: 519 }, { n: "Fútbol Argentino 2021", t: 481 }, { n: "Fútbol Argentino 2019-2020", t: 452 }, { n: "Fútbol Argentino 2018-2019", t: 392 }, { n: "Fútbol Argentino 2017-2018", t: 521 }, { n: "Fútbol Argentino 2016", t: 660 }, { n: "Fútbol Argentino 2015", t: 660 }, { n: "Fútbol Argentino 2014", t: 490 }, { n: "Fútbol Argentino 2013-2014", t: 504 }, { n: "Torneo Inicial Argentina 2012-2013", t: 440 }, { n: "Fútbol Argentino 2011", t: 450 }, { n: "Futbol Argentino Apertura 2010", t: 376 }, { n: "Futbol Argentino Apertura 2009", t: 563 }, { n: "Futbol Argentino Clausura 2008", t: 382 }, { n: "Futbol Argentino Apertura 2008", t: 640 }, { n: "Futbol Argentino Apertura 2006", t: 300 }, { n: "Copa Mundial de la FIFA Qatar 2022", t: 842 }, { n: "Copa Mundial de la FIFA Rusia 2018", t: 844 }, { n: "Copa Mundial de la FIFA Brasil 2014", t: 782 }, { n: "Copa Mundial FIFA Women's World Cup France 2019", t: 510 }, { n: "Copa Mundial FIFA World Cup South Africa 2010", t: 806 }, { n: "Copa Mundial FIFA World Cup Germany 2006", t: 605 }, { n: "Copa Mundial FIFA World Cup Korea/Japan 2002", t: 581 }, { n: "Copa Mundial FIFA World Cup France 1998", t: 561 }, { n: "Copa Mundial FIFA World Cup USA 1994", t: 444 }, { n: "Copa Mundial World Cup USA 1994 (Upper Deck)", t: 300 }, { n: "Copa Mundial FIFA World Cup Italia 1990", t: 448 }, { n: "Copa Mundial FIFA World Cup Mexico 1986", t: 427 }, { n: "Copa Mundial FIFA World Cup España 1982", t: 427 }, { n: "Copa Mundial FIFA World Cup Argentina 1978", t: 400 }, { n: "Copa Mundial FIFA World Cup München 1974", t: 400 }, { n: "Copa Mundial FIFA World Cup Mexico 1970", t: 288 }, { n: "Road to FIFA World Cup Qatar 2022", t: 600 }, { n: "Road to 2018 FIFA World Cup Russia", t: 480 }, { n: "Road to 2014 FIFA World Cup Brazil", t: 428 }, { n: "Road to the FIFA World Cup 2002", t: 150 }, { n: "World Cup Story", t: 262 }, { n: "CONMEBOL Copa América 2024", t: 494 }, { n: "CONMEBOL Copa América 2021", t: 369 }, { n: "CONMEBOL Copa América 2021 Preview", t: 400 }, { n: "CONMEBOL Copa América Brasil 2019", t: 400 }, { n: "CONMEBOL Copa América Centenario. USA 2016", t: 452 }, { n: "CONMEBOL Copa América. Chile 2015", t: 398 }, { n: "CONMEBOL Copa América. Argentina 2011", t: 371 }, { n: "CONMEBOL Copa América. Venezuela 2007", t: 300 }, { n: "CONMEBOL Copa América. Colombia 2001", t: 153 }];

        const CATALOGO_CARTAS = RAW_CARTAS.map(i => ({n: i.n.toUpperCase(), t: i.t})).sort((a,b) => a.n.localeCompare(b.n));
        const CATALOGO_FIGUS = RAW_FIGUS.map(i => ({n: i.n.toUpperCase(), t: i.t})).sort((a,b) => a.n.localeCompare(b.n));

        let db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
        let userName = localStorage.getItem('lta_user_name_v12') || "";
        let currentEditingId = null;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    if (userName === "") document.getElementById('login-screen').style.display = 'flex';
                    else showApp();
                }, 500);
            }, 1000);
        };

        function saveUser() {
            const input = document.getElementById('user-name-input').value.trim().toUpperCase();
            if (input === "") return;
            localStorage.setItem('lta_user_name_v12', input);
            userName = input;
            document.getElementById('login-screen').style.display = 'none';
            showApp();
        }

        function showApp() { document.getElementById('main-app').style.display = 'block'; renderInicio(); }

        function renderInicio() {
            document.getElementById('main-app').innerHTML = `
                <div style="text-align:center; margin: 30px 0;">
                    <img src="${LOGO_URL}" style="width:70px; border-radius:50%; border:1px solid #333;">
                    <h2 style="margin-top:10px">¡HOLA, ${userName}!</h2>
                    <div style="display:flex; justify-content:space-between; margin-top:20px;">
                        <button class="btn-backup" onclick="exportDB()">⬇ BACKUP</button>
                        <button class="btn-backup" onclick="document.getElementById('importInput').click()">⬆ SUBIR</button>
                        <input type="file" id="importInput" style="display:none" onchange="importDB(event)">
                    </div>
                </div>
                <div class="btn-tipo" onclick="setTipo('Carta')">🃏 MIS CARTAS</div>
                <div class="btn-tipo" onclick="setTipo('Figurita')">⚽ MIS FIGURITAS</div>
                <p style="text-align:center; color:#222; font-size:10px; margin-top:50px;" onclick="resetUser()">CAMBIAR NOMBRE</p>
            `;
        }

        function resetUser() { localStorage.removeItem('lta_user_name_v12'); location.reload(); }
        function setTipo(t) { tipoActual = t; renderMenu(); }

        function renderMenu() {
            const filtrados = db.filter(a => a.tipo === tipoActual);
            let html = `<button class="btn-back" onclick="renderInicio()">⬅ VOLVER</button>
                        <h3 style="margin-bottom:15px; text-transform: uppercase;">MIS ${tipoActual}S</h3>
                        <button class="btn-accion" style="padding:12px; font-size:14px;" onclick="renderNuevoForm()">+ AGREGAR DESDE CATÁLOGO</button><br><br>`;
            
            filtrados.forEach(a => {
                const porc = Math.floor((a.tengo.length / a.total) * 100);
                html += `
                    <div class="album-card" onclick="verAlbum('${a.id}')">
                        <div class="photo-edit" onclick="pedirFoto(event, '${a.id}')">
                            <img src="${a.img || LOGO_URL}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">
                        </div>
                        <div style="flex:1">
                            <strong style="font-size:13px">${a.nombre}</strong><br>
                            <small style="color:var(--red); font-size:11px">FALTAN: ${a.total - a.tengo.length}</small>
                            <div class="prog-container"><div class="prog-fill" style="width:${porc}%"></div></div>
                        </div>
                        <div class="delete-icon" onclick="eliminarAlbum(event, '${a.id}')">✖</div>
                    </div>`;
            });
            document.getElementById('main-app').innerHTML = html;
        }

        function pedirFoto(e, id) {
            e.stopPropagation();
            currentEditingId = id;
            const opcion = confirm("¿QUERÉS ELEGIR UNA FOTO DE TU GALERÍA?\n\n(Si tocás 'Cancelar', podrás poner un link)");
            if (opcion) {
                document.getElementById('photoInput').click();
            } else {
                const link = prompt("PEGÁ EL LINK DE LA IMAGEN:");
                if (link !== null) updateAlbumPhoto(id, link);
            }
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                // Comprimir un poco la imagen para no saturar el storage
                updateAlbumPhoto(currentEditingId, e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function updateAlbumPhoto(id, source) {
            const a = db.find(x => x.id === id);
            a.img = source;
            localStorage.setItem(DB_NAME, JSON.stringify(db));
            renderMenu();
        }

        // --- LAS FUNCIONES DE SIEMPRE (Ver álbum, toggle, etc.) ---
        function renderNuevoForm() {
            const catalogo = tipoActual === 'Carta' ? CATALOGO_CARTAS : CATALOGO_FIGUS;
            document.getElementById('main-app').innerHTML = `
                <button class="btn-back" onclick="renderMenu()">⬅ VOLVER</button>
                <div style="background:#111; padding:20px; border-radius:15px; border:1px solid #333">
                    <input type="text" id="search-cat" placeholder="🔎 BUSCAR..." onkeyup="filterSelect()">
                    <select id="select-catalogo" size="5"></select>
                    <hr style="border:0; border-top:1px solid #333; margin:15px 0">
                    <input type="text" id="custom-nombre" style="text-transform: uppercase;" placeholder="NOMBRE PERSONALIZADO">
                    <input type="number" id="custom-total" placeholder="CANTIDAD TOTAL">
                    <button class="btn-accion" onclick="guardarColeccion()">GUARDAR COLECCIÓN</button>
                </div>`;
            filterSelect();
        }

        function filterSelect() {
            const search = document.getElementById('search-cat').value.toUpperCase();
            const select = document.getElementById('select-catalogo');
            const catalogo = tipoActual === 'Carta' ? CATALOGO_CARTAS : CATALOGO_FIGUS;
            select.innerHTML = catalogo
                .filter(i => i.n.includes(search))
                .map((item, index) => `<option value="${index}">${item.n} (${item.t})</option>`).join('');
            if (select.options.length > 0) select.selectedIndex = 0;
        }

        function guardarColeccion() {
            const select = document.getElementById('select-catalogo');
            const customNombre = document.getElementById('custom-nombre').value.trim().toUpperCase();
            const customTotal = parseInt(document.getElementById('custom-total').value);
            const catalogoFull = tipoActual === 'Carta' ? CATALOGO_CARTAS : CATALOGO_FIGUS;
            let nombre, total;
            if (customNombre !== "" && !isNaN(customTotal)) {
                nombre = customNombre; total = customTotal;
            } else if (select.value !== "") {
                const search = document.getElementById('search-cat').value.toUpperCase();
                const filtered = catalogoFull.filter(i => i.n.includes(search));
                const item = filtered[select.selectedIndex];
                nombre = item.n; total = item.t;
            } else { return alert("FALTAN DATOS"); }

            db.push({ id: "c_" + Date.now(), nombre, total, tipo: tipoActual, img: "", tengo: [] });
            localStorage.setItem(DB_NAME, JSON.stringify(db));
            renderMenu();
        }

        function verAlbum(id) {
            const a = db.find(x => x.id === id);
            filtroSoloFaltantes = false;
            let html = `
                <div style="position:sticky; top:0; background:var(--bg); padding-bottom:10px; z-index:10; border-bottom:1px solid #222">
                    <button class="btn-back" onclick="renderMenu()">⬅ VOLVER</button>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${a.img || LOGO_URL}" style="width:40px; height:40px; border-radius:5px; object-fit:cover;" onclick="pedirFoto(event, '${a.id}')">
                        <h3 style="margin:0; font-size:13px; flex:1;">${a.nombre}</h3>
                        <button class="btn-filter" id="btnFiltro" onclick="toggleFiltroFaltantes()">VER FALTANTES</button>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px">
                         <small style="color:var(--red)" id="count-faltan">FALTAN: ${a.total - a.tengo.length}</small>
                         <small style="color:var(--accent)" id="count-tengo">TENGO: ${a.tengo.length}</small>
                    </div>
                    <button class="btn-share" onclick="compartirFaltantes('${a.id}')">📲 COMPARTIR WHATSAPP</button>
                </div>
                <div class="grid" id="main-grid">`;
            for(let i=1; i<=a.total; i++) {
                const clase = a.tengo.includes(i) ? 'tengo' : '';
                html += `<div class="nro ${clase}" id="card-${i}" onclick="toggle('${id}', ${i})">${i}</div>`;
            }
            html += `</div>`;
            document.getElementById('main-app').innerHTML = html;
        }

        function toggle(albumId, nro) {
            const a = db.find(x => x.id === albumId);
            const idx = a.tengo.indexOf(nro);
            const el = document.getElementById(`card-${nro}`);
            if(idx > -1) { a.tengo.splice(idx, 1); el.classList.remove('tengo'); } 
            else { a.tengo.push(nro); el.classList.add('tengo'); }
            localStorage.setItem(DB_NAME, JSON.stringify(db));
            document.getElementById('count-faltan').innerText = `FALTAN: ${a.total - a.tengo.length}`;
            document.getElementById('count-tengo').innerText = `TENGO: ${a.tengo.length}`;
        }

        function toggleFiltroFaltantes() {
            filtroSoloFaltantes = !filtroSoloFaltantes;
            const btn = document.getElementById('btnFiltro');
            const cards = document.querySelectorAll('.nro.tengo');
            btn.innerText = filtroSoloFaltantes ? "VER TODAS" : "VER FALTANTES";
            cards.forEach(c => c.classList.toggle('oculto', filtroSoloFaltantes));
        }

        function eliminarAlbum(e, id) {
            e.stopPropagation();
            if(confirm("¿ELIMINAR?")) {
                db = db.filter(x => x.id !== id);
                localStorage.setItem(DB_NAME, JSON.stringify(db));
                renderMenu();
            }
        }

        function exportDB() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({db, userName}));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "backup_" + userName + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importDB(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const imported = JSON.parse(e.target.result);
                db = imported.db;
                userName = imported.userName;
                localStorage.setItem(DB_NAME, JSON.stringify(db));
                localStorage.setItem('lta_user_name_v12', userName);
                location.reload();
            };
            reader.readAsText(file);
        }

        function compartirFaltantes(id) {
            const a = db.find(x => x.id === id);
            const faltan = [];
            for(let i=1; i<=a.total; i++) { if(!a.tengo.includes(i)) faltan.push(i); }
            window.open("https://wa.me/?text=" + encodeURIComponent(`¡HOLA! ME FALTAN ESTAS DE *${a.nombre}*:\n\n` + faltan.join(", ")), '_blank');
        }
    </script>
</body>
</html>
