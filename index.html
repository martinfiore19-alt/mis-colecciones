<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA TABERNA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root { 
            --bg: #000000; --card: #161616; --text: #ffffff; 
            --accent: #2196F3; --gold: #FFD700;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }

        /* --- SPLASH SCREEN XL --- */
        #splash { 
            position: fixed; inset: 0; background: #000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 99999; transition: opacity 0.8s; 
        }
        
        .logo-container { 
            position: relative; 
            width: 320px; height: 320px; /* Tamaño masivo */
            display: flex; justify-content: center; align-items: center; 
        }

        .logo-glow {
            position: absolute; inset: -15px; border-radius: 50%;
            background: conic-gradient(transparent, var(--accent), transparent 40%);
            animation: girar 2s linear infinite;
            filter: blur(10px);
        }

        .logo-img { 
            width: 300px; height: 300px; 
            border-radius: 50%; object-fit: cover; 
            border: 5px solid #000; z-index: 10;
        }

        .splash-title { 
            margin-top: 40px; color: white; font-weight: bold; 
            letter-spacing: 5px; font-size: 22px; text-align: center;
            text-shadow: 0 0 20px var(--accent); 
        }

        @keyframes girar { 100% { transform: rotate(360deg); } }

        /* Botón de instalación (aparece si no está instalada) */
        #install-banner {
            display: none; background: var(--accent); color: white;
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            padding: 15px; border-radius: 12px; text-align: center;
            font-weight: bold; z-index: 999; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        /* --- RESTO DE LA APP (Igual que antes) --- */
        #main-app { display: none; max-width: 500px; margin: auto; }
        .btn-tipo { background: var(--card); padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
        .nro { background: #1a1a1a; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .nro.tengo { background: var(--accent); color: white; }
        .nro.repe { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-container">
            <div class="logo-glow" id="splash-glow"></div>
            <img src="https://raw.githubusercontent.com/martinfiore19-alt/mis-colecciones/main/logo.png" class="logo-img">
        </div>
        <div class="splash-title">LA TABERNA</div>
    </div>

    <div id="install-banner" onclick="installApp()">
        📲 INSTALAR APP EN MI CELULAR
    </div>

    <div id="main-app">
        </div>

    <script>
        let deferredPrompt;
        const banner = document.getElementById('install-banner');

        // Detectar si la app se puede instalar
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            banner.style.display = 'block'; // Mostrar el cartel de instalar
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') banner.style.display = 'none';
                deferredPrompt = null;
            }
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                }, 800);
            }, 3000); // 3 segundos de Splash gigante
        };

        // ... El resto de tu lógica de db, cartas y demás ...
    </script>
</body>
</html>
