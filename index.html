<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L.T.A. - EL ROJO EDITION</title>
    <style>
        :root { 
            --bg: #0a0a0a; --card: #161616; --text: #ffffff; 
            --accent: #E53935; /* Rojo Independiente */
            --whatsapp: #25d366; --gold: #FFD700; --blue: #1E88E5; 
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        
        /* Splash y Login */
        #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s; }
        .logo-img { width: 80%; max-width: 250px; border-radius: 50%; border: 3px solid var(--accent); box-shadow: 0 0 20px rgba(229, 57, 53, 0.4); }

        #main-app { display: none; max-width: 500px; margin: auto; }
        
        /* Botones y Cards */
        .btn-tipo { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-tipo:active { transform: scale(0.98); }
        
        .album-card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #222; cursor: pointer; position: relative; }
        
        .photo-edit { width: 65px; height: 65px; object-fit: cover; border-radius: 10px; border: 2px solid #333; background: #111; overflow: hidden; position: relative; }
        
        /* Sistema de Progresos */
        .stats-box { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 20px; border-left: 5px solid var(--accent); }
        .prog-container { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); transition: width 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* Grilla de Números Mejorada */
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 15px; }
        .nro { 
            background: #1a1a1a; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; color: #444; border: 1px solid #222; font-weight: bold; font-size: 14px; cursor: pointer; position: relative;
        }
        .nro.tengo { background: var(--accent); color: white; border-color: #ffcdd2; }
        .nro.repe { background: var(--gold); color: black; border-color: #fff; }
        .nro.repe::after { content: '+1'; position: absolute; top: -5px; right: -5px; background: black; color: white; font-size: 9px; padding: 2px 4px; border-radius: 10px; border: 1px solid var(--gold); }
        .nro.oculto { display: none; }

        /* Inputs y Acciones */
        input, select { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 12px; font-size: 16px; margin-bottom: 15px; }
        .btn-accion { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(229, 57, 53, 0.3); }
        .btn-share { background: var(--whatsapp); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-back { background: #222; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; }
        
        .badge-info { font-size: 11px; padding: 4px 8px; border-radius: 20px; background: #333; color: #ccc; }
        .delete-icon { position: absolute; top: 8px; right: 8px; color: #444; font-size: 18px; }
        
        #theme-toggle { position: absolute; top: 15px; right: 15px; background: transparent; border: 1px solid #333; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="https://raw.githubusercontent.com/martinfiore19-alt/mis-colecciones/main/logo.png" class="logo-img">
        <h1 style="color:var(--accent); margin-top:20px; letter-spacing: 2px;">REY DE COPAS</h1>
        <p style="color:#666; font-size: 12px;">TRACKER DE COLECCIONES</p>
    </div>

    <div id="main-app"></div>

    <input type="file" id="photoInput" style="display:none" accept="image/*" onchange="handleFileSelect(event)">

    <script>
        const DB_NAME = 'lta_diablo_v1';
        const LOGO_URL = "https://raw.githubusercontent.com/martinfiore19-alt/mis-colecciones/main/logo.png";
        
        // --- CATÁLOGOS (Aquí van tus listas completas de antes) ---
        const CATALOGO_CARTAS = [{n: "COPA MUNDIAL 2026 ADRENALYN", t: 630}, {n: "FIFA 365 2025", t: 450}, {n: "LIBERTADORES 2024", t: 383}].sort((a,b)=>a.n.localeCompare(b.n));
        const CATALOGO_FIGUS = [{n: "FIFA 365 2026", t: 660}, {n: "QATAR 2022", t: 638}, {n: "FÚTBOL ARGENTINO 2024", t: 508}].sort((a,b)=>a.n.localeCompare(b.n));

        let db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
        let userName = localStorage.getItem('lta_user_name_v12') || "MARTÍN";
        let currentId = null;
        let filtroFaltantes = false;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    showApp();
                }, 500);
            }, 1200);
        };

        function showApp() { 
            document.getElementById('main-app').style.display = 'block'; 
            renderInicio(); 
        }

        function renderInicio() {
            let totalTengo = 0;
            db.forEach(a => totalTengo += a.tengo.length);

            document.getElementById('main-app').innerHTML = `
                <div style="text-align:center; padding: 20px 0;">
                    <img src="${LOGO_URL}" style="width:80px; border-radius:50%; border:2px solid var(--accent);">
                    <h2 style="margin:10px 0 5px 0;">¡HOLA, ${userName}!</h2>
                    <span class="badge-info">TOTAL COLECCIONADO: ${totalTengo}</span>
                </div>
                
                <div class="stats-box">
                    <strong>ESTADO GLOBAL</strong>
                    <p style="font-size:12px; color:#aaa; margin:5px 0;">Tenés ${db.length} álbumes activos en tu estante virtual.</p>
                </div>

                <div class="btn-tipo" onclick="setTipo('Carta')">🃏 MIS CARTAS</div>
                <div class="btn-tipo" onclick="setTipo('Figurita')">⚽ MIS FIGURITAS</div>
                
                <div style="display:flex; justify-content:space-between; margin-top:20px;">
                    <button class="btn-back" style="width:48%; background:#333;" onclick="exportDB()">⬇ BACKUP</button>
                    <button class="btn-back" style="width:48%; background:#333;" onclick="document.getElementById('importInput').click()">⬆ SUBIR</button>
                    <input type="file" id="importInput" style="display:none" onchange="importDB(event)">
                </div>
            `;
        }

        function setTipo(t) { tipoActual = t; renderMenu(); }

        function renderMenu() {
            const filtrados = db.filter(a => a.tipo === tipoActual);
            let html = `<button class="btn-back" onclick="renderInicio()">⬅ VOLVER</button>
                        <h3 style="margin-bottom:15px; color:var(--accent)">MIS ${tipoActual.toUpperCase()}S</h3>
                        <button class="btn-accion" onclick="renderNuevoForm()">+ NUEVA COLECCIÓN</button><br><br>`;
            
            filtrados.forEach(a => {
                const porc = Math.floor((a.tengo.length / a.total) * 100);
                const repes = a.repes ? a.repes.length : 0;
                html += `
                    <div class="album-card" onclick="verAlbum('${a.id}')">
                        <div class="photo-edit" onclick="pedirFoto(event, '${a.id}')">
                            <img src="${a.img || LOGO_URL}" style="width:100%; height:100%; object-fit:cover;">
                        </div>
                        <div style="flex:1">
                            <strong style="font-size:14px">${a.nombre}</strong><br>
                            <small style="color:var(--accent); font-weight:bold;">${porc}% COMPLETADO</small>
                            ${repes > 0 ? `<small style="color:var(--gold); margin-left:10px;">• ${repes} REPES</small>` : ''}
                            <div class="prog-container"><div class="prog-fill" style="width:${porc}%"></div></div>
                        </div>
                        <div class="delete-icon" onclick="eliminarAlbum(event, '${a.id}')">✖</div>
                    </div>`;
            });
            document.getElementById('main-app').innerHTML = html;
        }

        function verAlbum(id) {
            currentId = id;
            const a = db.find(x => x.id === id);
            if (!a.repes) a.repes = [];
            filtroFaltantes = false;

            let html = `
                <div style="position:sticky; top:0; background:var(--bg); padding-bottom:10px; z-index:10; border-bottom:1px solid #222">
                    <button class="btn-back" onclick="renderMenu()">⬅ VOLVER</button>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${a.img || LOGO_URL}" style="width:45px; height:45px; border-radius:8px; border:1px solid var(--accent);">
                        <div style="flex:1">
                            <h3 style="margin:0; font-size:14px; color:var(--accent)">${a.nombre}</h3>
                            <small id="sub-stats">${a.tengo.length} de ${a.total} (${a.repes.length} repes)</small>
                        </div>
                        <button class="btn-back" style="margin:0; padding:5px 10px; font-size:10px;" onclick="toggleFiltro()">🔎 FALTANTES</button>
                    </div>
                    <button class="btn-share" onclick="compartirWhatsApp('${a.id}')">📲 ENVIAR LISTA DE CAMBIO</button>
                </div>
                <div class="grid" id="main-grid">`;

            for(let i=1; i<=a.total; i++) {
                let clase = "";
                if (a.repes.includes(i)) clase = "tengo repe";
                else if (a.tengo.includes(i)) clase = "tengo";
                
                html += `<div class="nro ${clase}" id="n-${i}" onclick="cicloFigu('${id}', ${i})">${i}</div>`;
            }
            html += `</div>`;
            document.getElementById('main-app').innerHTML = html;
            window.scrollTo(0,0);
        }

        function cicloFigu(id, n) {
            const a = db.find(x => x.id === id);
            const el = document.getElementById(`n-${n}`);
            
            // Ciclo: Nada -> Tengo -> Repe -> Nada
            if (!a.tengo.includes(n) && !a.repes.includes(n)) {
                a.tengo.push(n);
                el.classList.add('tengo');
            } else if (a.tengo.includes(n) && !a.repes.includes(n)) {
                a.repes.push(n);
                el.classList.add('repe');
            } else {
                a.tengo = a.tengo.filter(x => x !== n);
                a.repes = a.repes.filter(x => x !== n);
                el.classList.remove('tengo', 'repe');
                if (filtroFaltantes) el.classList.add('oculto');
            }
            
            localStorage.setItem(DB_NAME, JSON.stringify(db));
            document.getElementById('sub-stats').innerText = `${a.tengo.length} de ${a.total} (${a.repes.length} repes)`;
        }

        function toggleFiltro() {
            filtroFaltantes = !filtroFaltantes;
            const tengos = document.querySelectorAll('.nro.tengo');
            tengos.forEach(x => x.classList.toggle('oculto', filtroFaltantes));
        }

        function compartirWhatsApp(id) {
            const a = db.find(x => x.id === id);
            const faltan = [];
            for(let i=1; i<=a.total; i++) { if(!a.tengo.includes(i)) faltan.push(i); }
            
            let msg = `*CONTROL DE ÁLBUM: ${a.nombre}*\n\n`;
            msg += `❌ *ME FALTAN:* \n${faltan.join(", ")}\n\n`;
            msg += `🔄 *TENGO PARA CAMBIAR:* \n${a.repes.length > 0 ? a.repes.join(", ") : "Sin repetidas aún."}`;
            
            window.open("https://wa.me/?text=" + encodeURIComponent(msg), '_blank');
        }

        // --- MANEJO DE FOTOS ---
        function pedirFoto(e, id) {
            e.stopPropagation();
            currentId = id;
            if (confirm("¿SUBIR FOTO DESDE GALERÍA?\n(Presiona 'Cancelar' para usar un link)")) {
                document.getElementById('photoInput').click();
            } else {
                const link = prompt("LINK DE LA FOTO:");
                if (link) updateAlbumPhoto(id, link);
            }
        }

        function handleFileSelect(e) {
            const reader = new FileReader();
            reader.onload = (event) => updateAlbumPhoto(currentId, event.target.result);
            reader.readAsDataURL(e.target.files[0]);
        }

        function updateAlbumPhoto(id, src) {
            db.find(x => x.id === id).img = src;
            localStorage.setItem(DB_NAME, JSON.stringify(db));
            renderMenu();
        }

        // --- BACKUP ---
        function exportDB() {
            const blob = new Blob([JSON.stringify({db, userName})], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `rey_de_copas_backup.json`;
            a.click();
        }

        function importDB(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = JSON.parse(ev.target.result);
                db = data.db; userName = data.userName;
                localStorage.setItem(DB_NAME, JSON.stringify(db));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }

        function renderNuevoForm() {
            document.getElementById('main-app').innerHTML = `
                <button class="btn-back" onclick="renderMenu()">⬅ VOLVER</button>
                <div style="background:#1a1a1a; padding:20px; border-radius:15px; border:1px solid var(--accent)">
                    <h3 style="margin-top:0">NUEVO ÁLBUM</h3>
                    <input type="text" id="n-nombre" placeholder="NOMBRE (EJ: MÉXICO 86)">
                    <input type="number" id="n-total" placeholder="CANTIDAD TOTAL">
                    <button class="btn-accion" onclick="crearCustom()">CREAR ÁLBUM</button>
                </div>`;
        }

        function crearCustom() {
            const n = document.getElementById('n-nombre').value.toUpperCase();
            const t = parseInt(document.getElementById('n-total').value);
            if (!n || !t) return alert("COMPLETÁ LOS DATOS");
            db.push({id: 'a'+Date.now(), nombre: n, total: t, tipo: tipoActual, tengo: [], repes: [], img: ""});
            localStorage.setItem(DB_NAME, JSON.stringify(db));
            renderMenu();
        }

        function eliminarAlbum(e, id) {
            e.stopPropagation();
            if(confirm("¿BORRAR COLECCIÓN?")) {
                db = db.filter(x => x.id !== id);
                localStorage.setItem(DB_NAME, JSON.stringify(db));
                renderMenu();
            }
        }
    </script>
</body>
</html>
