<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App de Colecciones</title>
    <style>
        :root { --primary: #0288d1; --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #2e7d32; --whatsapp: #25d366; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; }
        
        #main-app { display: none; max-width: 500px; margin: auto; }
        .btn-tipo { background: var(--card); padding: 30px 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; font-size: 20px; font-weight: bold; cursor: pointer; border: 1px solid #333; }
        
        .album-card { background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #333; cursor: pointer; }
        .album-card img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #222; }
        
        /* Barra de Progreso en el Menú */
        .prog-container { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--primary); transition: width 0.5s; }

        /* GRILLA MINIATURA (7 columnas) */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 15px; }
        .nro { 
            background: #1e1e1e; 
            padding: 8px 0; 
            text-align: center; 
            border-radius: 4px; 
            color: #ff5252; 
            border: 1px solid #333; 
            font-weight: bold; 
            font-size: 12px; /* Texto más chico */
            cursor: pointer; 
        }
        .nro.tengo { background: var(--accent); color: white; border-color: #fff; }

        .btn-accion { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-share { background: var(--whatsapp); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-back { background: #444; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="color:var(--primary)">MI COLECCIÓN</h1>
        <p>Optimizando vista...</p>
    </div>

    <div id="main-app"></div>

    <script>
        const CATALOGO = [
            { id: "f26", nombre: "FIFA 365 2026", total: 630, tipo: "Carta", img: "https://m.media-amazon.com/images/I/71C7x6y-G9L._AC_SL1500_.jpg" },
            { id: "ca24", nombre: "Copa América 2024", total: 430, tipo: "Figurita", img: "https://exitocol.vtexassets.com/arquivos/ids/22373752/Album-Copa-America-2024-Panini.jpg" }
        ];

        let db = JSON.parse(localStorage.getItem('colecciones_v6')) || [];
        let tipoActual = "";

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                renderInicio();
            }, 1000);
        };

        function renderInicio() {
            document.getElementById('main-app').innerHTML = `
                <h2 style="text-align:center; margin-top:30px">Mis Álbumes</h2>
                <div class="btn-tipo" onclick="setTipo('Carta')">🃏 CARTAS</div>
                <div class="btn-tipo" onclick="setTipo('Figurita')">⚽ FIGURITAS</div>
            `;
        }

        function setTipo(t) { tipoActual = t; renderMenu(); }

        function renderMenu() {
            const filtrados = db.filter(a => a.tipo === tipoActual);
            let html = `<button class="btn-back" onclick="renderInicio()">⬅ Volver</button>
                        <h3 style="margin: 10px 0;">Mis ${tipoActual}s</h3>
                        <button class="btn-accion" style="background:#1b5e20; padding:10px;" onclick="renderNuevoForm()">+ AGREGAR NUEVA</button><br><br>`;
            
            filtrados.forEach(a => {
                const totalTengo = a.tengo.length;
                const porcLleno = Math.floor((totalTengo / a.total) * 100);
                const porcFaltante = 100 - porcLleno;

                html += `
                    <div class="album-card" onclick="verAlbum('${a.id}')">
                        <img src="${a.img || 'https://via.placeholder.com/50?text=Img'}">
                        <div style="flex:1">
                            <strong style="font-size:14px">${a.nombre}</strong><br>
                            <small style="color:#aaa; font-size:11px">Falta el ${porcFaltante}% (${a.total - totalTengo} u.)</small>
                            <div class="prog-container"><div class="prog-fill" style="width:${porcLleno}%"></div></div>
                        </div>
                    </div>`;
            });
            document.getElementById('main-app').innerHTML = html;
        }

        function renderNuevoForm() {
            document.getElementById('main-app').innerHTML = `
                <button class="btn-back" onclick="renderMenu()">⬅ Volver</button>
                <div style="background:#252525; padding:15px; border-radius:10px; border:1px solid var(--primary)">
                    <h4>Nueva Colección</h4>
                    <input type="text" id="custom-nombre" placeholder="Nombre" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #444; color:white; border-radius:5px; box-sizing:border-box">
                    <input type="number" id="custom-total" placeholder="Cantidad" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #444; color:white; border-radius:5px; box-sizing:border-box">
                    <button class="btn-accion" onclick="guardarPersonalizada()">CREAR</button>
                </div>`;
        }

        function guardarPersonalizada() {
            const nombre = document.getElementById('custom-nombre').value;
            const total = parseInt(document.getElementById('custom-total').value);
            if(!nombre || !total) return;
            db.push({ id: "c_" + Date.now(), nombre, total, tipo: tipoActual, img: "", tengo: [] });
            localStorage.setItem('colecciones_v6', JSON.stringify(db));
            renderMenu();
        }

        function verAlbum(id) {
            const a = db.find(x => x.id === id);
            let html = `
                <div style="position:sticky; top:0; background:var(--bg); padding-bottom:10px; z-index:10; border-bottom:1px solid #333">
                    <button class="btn-back" onclick="renderMenu()">⬅ Volver</button>
                    <h3 style="margin:0">${a.nombre}</h3>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px">
                         <small style="color:#ff5252">Faltan: ${a.total - a.tengo.length}</small>
                         <small style="color:var(--accent)">Tengo: ${a.tengo.length}</small>
                    </div>
                    <button class="btn-share" onclick="compartirFaltantes('${a.id}')">📲 COMPARTIR FALTANTES</button>
                </div>

                <div class="grid">`;
            for(let i=1; i<=a.total; i++) {
                const clase = a.tengo.includes(i) ? 'tengo' : '';
                html += `<div class="nro ${clase}" onclick="toggle('${id}', ${i})">${i}</div>`;
            }
            html += `</div>`;
            document.getElementById('main-app').innerHTML = html;
            window.scrollTo(0,0);
        }

        function toggle(id, n) {
            const a = db.find(x => x.id === id);
            const idx = a.tengo.indexOf(n);
            if(idx > -1) a.tengo.splice(idx, 1);
            else a.tengo.push(n);
            localStorage.setItem('colecciones_v6', JSON.stringify(db));
            verAlbum(id);
        }

        function compartirFaltantes(id) {
            const a = db.find(x => x.id === id);
            const faltan = [];
            for(let i=1; i<=a.total; i++) { if(!a.tengo.includes(i)) faltan.push(i); }
            if(faltan.length === 0) return alert("¡Completado!");
            const texto = `Me faltan estas de *${a.nombre}*:\n\n` + faltan.join(", ");
            window.open("https://wa.me/?text=" + encodeURIComponent(texto), '_blank');
        }
    </script>
</body>
</html>
