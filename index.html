<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Álbum Digital</title>
    <style>
        :root { --primary: #0288d1; --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #2e7d32; }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 40px; 
            overflow-x: hidden; 
        }
        
        /* Splash Screen - A prueba de fallos */
        #splash { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle, #1e1e1e 0%, #000 100%); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 10000; 
            transition: opacity 0.6s ease; 
        }
        .logo-anim { font-size: 60px; margin-bottom: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Contenedor Principal */
        .container { max-width: 500px; margin: auto; display: none; opacity: 0; transition: opacity 0.5s ease; }
        .visible { display: block; opacity: 1; }
        
        /* Estilos de Menú */
        .btn-tipo { background: var(--card); padding: 35px 20px; border-radius: 15px; border: 1px solid #333; text-align: center; margin-bottom: 20px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-tipo span { font-size: 40px; display: block; margin-bottom: 10px; }

        .album-card { background: var(--card); border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; overflow: hidden; border: 1px solid #333; cursor: pointer; }
        .album-card img { width: 90px; height: 90px; object-fit: cover; background: #222; }
        .album-info { padding: 10px 15px; flex: 1; }
        
        /* Progreso */
        .prog-bg { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.5s ease; }

        /* Grilla de Números */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .nro { background: #1e1e1e; padding: 15px 0; text-align: center; border-radius: 8px; border: 1px solid #444; color: #ff5252; font-weight: bold; font-size: 16px; user-select: none; }
        .nro.tengo { background: var(--accent); color: white; border-color: #fff; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        /* Botones y Modales */
        .btn-back { background: #444; border: none; color: white; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .btn-add { background: var(--accent); color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; margin-bottom: 25px; cursor: pointer; }
        
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; padding: 30px; z-index: 2000; text-align: center; }
        select { width: 100%; padding: 15px; background: #222; color: white; border-radius: 10px; border: 1px solid var(--primary); font-size: 16px; margin-bottom: 30px; }
        
        .empty-msg { text-align: center; color: #666; margin-top: 40px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-anim">🃏⚽</div>
        <h2 style="margin:0; letter-spacing:2px; font-size: 20px;">BIENVENIDO A TU</h2>
        <h1 style="margin:5px 0; color:var(--primary); font-style:italic; font-size: 32px;">ÁLBUM DIGITAL</h1>
    </div>

    <div class="container" id="main-app"></div>

    <div id="modal">
        <h2 style="margin-top: 20vh;">Elegí tu colección</h2>
        <p style="color: #888;">Se agregará a tu lista personal</p>
        <select id="select-catalogo"></select>
        <button class="btn-add" onclick="agregarDeCatalogo()">AGREGAR AHORA</button>
        <button class="btn-back" onclick="cerrarModal()" style="width:100%; background:none; border:1px solid #444;">Cancelar</button>
    </div>

    <script>
        // --- CATÁLOGO DE FÚTBOL PRECARGADO ---
        const CATALOGO = [
            { id: "fifa365_26", nombre: "FIFA 365 2026", total: 630, tipo: "Carta", img: "https://m.media-amazon.com/images/I/71C7x6y-G9L._AC_SL1500_.jpg" },
            { id: "copa_am24", nombre: "Copa América 2024", total: 430, tipo: "Figurita", img: "https://exitocol.vtexassets.com/arquivos/ids/22373752/Album-Copa-America-2024-Panini.jpg" },
            { id: "lpf_24", nombre: "Liga Profesional 2024", total: 528, tipo: "Figurita", img: "https://cloudfront-us-east-1.images.arcpublishing.com/infobae/T7XNVN2GIBH3NIXYV2P5Y7I47E.jpg" },
            { id: "qatar_22", nombre: "Mundial Qatar 2022", total: 638, tipo: "Figurita", img: "https://m.media-amazon.com/images/I/71u9S+HtoLL._AC_UF894,1000_QL80_.jpg" },
            { id: "euro_24", nombre: "UEFA Euro 2024", total: 728, tipo: "Figurita", img: "https://m.media-amazon.com/images/I/81+XU-PzV+L.jpg" }
        ];

        let db = JSON.parse(localStorage.getItem('mis_colecciones_v1')) || [];
        let tipoActual = "";

        // Control de inicio (Splash)
        window.addEventListener('load', () => {
            const tiempoMinimo = 2200;
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    const app = document.getElementById('main-app');
                    app.classList.add('visible');
                    renderInicio();
                }, 600);
            }, tiempoMinimo);
        });

        function renderInicio() {
            document.getElementById('main-app').innerHTML = `
                <div style="padding-top:10vh">
                    <h1 style="text-align:center; margin-bottom:40px;">¿Qué vamos a completar hoy?</h1>
                    <div class="btn-tipo" onclick="setTipo('Carta')"><span>🃏</span> MIS CARTAS</div>
                    <div class="btn-tipo" onclick="setTipo('Figurita')"><span>⚽</span> MIS FIGURITAS</div>
                </div>`;
        }

        function setTipo(t) {
            tipoActual = t;
            renderMenu();
        }

        function renderMenu() {
            const filtrados = db.filter(a => a.tipo === tipoActual);
            let html = `
                <button class="btn-back" onclick="renderInicio()">⬅ Inicio</button>
                <h2 style="margin-bottom:25px;">Colecciones de ${tipoActual}s</h2>
                <button class="btn-add" onclick="abrirModal()">+ Agregar Nuevo Álbum</button>`;

            if (filtrados.length === 0) {
                html += `<div class="empty-msg">No tenés álbumes guardados aquí.<br>¡Agregá el primero!</div>`;
            } else {
                filtrados.forEach(a => {
                    const porcentaje = Math.floor((a.obtenidas.length / a.total) * 100);
                    html += `
                        <div class="album-card" onclick="renderDetalle('${a.id}')">
                            <img src="${a.img}" onerror="this.src='https://via.placeholder.com/90?text=No+Img'">
                            <div class="album-info">
                                <strong style="font-size:18px">${a.nombre}</strong><br>
                                <small style="color:#aaa">${a.obtenidas.length} de ${a.total} obtenidas</small>
                                <div class="prog-bg"><div class="prog-fill" style="width:${porcentaje}%"></div></div>
                                <span style="font-size:11px; color:var(--accent); font-weight:bold">${porcentaje}% completado</span>
                            </div>
                        </div>`;
                });
            }
            
            html += `<div style="margin-top:50px; text-align:center; color:#444; font-size:12px;">App Privada - Datos guardados en tu dispositivo</div>`;
            document.getElementById('main-app').innerHTML = html;
        }

        function renderDetalle(id) {
            const album = db.find(a => a.id === id);
            let html = `
                <div style="position:sticky; top:0; background:var(--bg); padding-bottom:10px; z-index:100">
                    <button class="btn-back" onclick="renderMenu()" style="margin-bottom:10px">⬅ Volver</button>
                    <h2 style="margin:0; color:var(--primary)">${album.nombre}</h2>
                    <p style="margin:5px 0; color:#888">Tocá los números para marcar lo que tenés:</p>
                    <div style="background:#222; padding:10px; border-radius:8px; display:flex; justify-content:space-between">
                        <span>Faltan: <b>${album.total - album.obtenidas.length}</b></span>
                        <span style="color:var(--accent)">Tengo: <b>${album.obtenidas.length}</b></span>
                    </div>
                </div>
                <div class="grid">`;
            
            for (let i = 1; i <= album.total; i++) {
                const clase = album.obtenidas.includes(i) ? 'tengo' : '';
                html += `<div class="nro ${clase}" id="nro-${i}" onclick="toggleNro('${id}', ${i})">${i}</div>`;
            }
            html += `</div>`;
            document.getElementById('main-app').innerHTML = html;
            window.scrollTo(0,0);
        }

        function toggleNro(albumId, nro) {
            const album = db.find(a => a.id === albumId);
            const index = album.obtenidas.indexOf(nro);
            const el = document.getElementById(`nro-${nro}`);
            
            if (index > -1) {
                album.obtenidas.splice(index, 1);
                el.classList.remove('tengo');
            } else {
                album.obtenidas.push(nro);
                el.classList.add('tengo');
            }
            // Guardado automático silencioso
            localStorage.setItem('mis_colecciones_v1', JSON.stringify(db));
        }

        function abrirModal() {
            const select = document.getElementById('select-catalogo');
            const opciones = CATALOGO.filter(c => c.tipo === tipoActual);
            select.innerHTML = opciones.map(c => `<option value="${c.id}">${c.nombre} (${c.total} items)</option>`).join('');
            document.getElementById('modal').style.display = 'block';
        }

        function cerrarModal() { document.getElementById('modal').style.display = 'none'; }

        function agregarDeCatalogo() {
            const id = document.getElementById('select-catalogo').value;
            if (db.some(a => a.id === id)) {
                alert("Ya tenés este álbum en tu lista.");
                return;
            }
            
            const item = CATALOGO.find(c => c.id === id);
            db.push({ ...item, obtenidas: [] });
            localStorage.setItem('mis_colecciones_v1', JSON.stringify(db));
            cerrarModal();
            renderMenu();
        }
    </script>
</body>
</html>
