<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Taberna de los Álbumes - L.T.A.</title>
    <style>
        :root { --primary: #ffffff; --bg: #000000; --card: #1a1a1a; --text: #ffffff; --accent: #2e7d32; --whatsapp: #25d366; --red: #ff5252; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        /* PANTALLA DE INICIO */
        #splash { 
            position: fixed; inset: 0; background: #000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 99999; transition: opacity 0.8s;
        }
        .logo-img { 
            width: 85%; max-width: 320px; 
            border-radius: 50%; border: 2px solid #333;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #main-app { display: none; max-width: 500px; margin: auto; }
        
        .btn-tipo { background: var(--card); padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border: 1px solid #333; }
        .album-card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #333; cursor: pointer; }
        .album-card img { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; background: #222; }
        
        .prog-container { width: 100%; height: 5px; background: #333; border-radius: 3px; margin-top: 6px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); transition: width 0.5s; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .nro { 
            background: #1a1a1a; padding: 12px 0; text-align: center; border-radius: 4px; 
            color: var(--red); border: 1px solid #333; font-weight: bold; font-size: 11px; 
            cursor: pointer; transition: background 0.2s;
        }
        .nro.tengo { background: var(--accent) !important; color: white !important; border-color: #fff !important; }

        .btn-accion { background: #333; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; border: 1px solid #444; }
        .btn-share { background: var(--whatsapp); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-back { background: #222; color: #aaa; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="https://raw.githubusercontent.com/martinfiore19-alt/mis-colecciones/main/logo.png" 
             class="logo-img" 
             onerror="this.src='https://via.placeholder.com/320x320?text=%E2%9A%BD+L.T.A.'">
        <p style="margin-top:30px; color:#555; letter-spacing: 2px; font-size: 12px; font-weight: bold;">LA TABERNA DE LOS ÁLBUMES</p>
    </div>

    <div id="main-app"></div>

    <script>
        // Cambiamos el nombre de la DB para forzar el refresco de los cambios visuales
        const DB_NAME = 'colecciones_v10';
        const LOGO_URL = "https://raw.githubusercontent.com/martinfiore19-alt/mis-colecciones/main/logo.png";

        let db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
        let tipoActual = "";

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    renderInicio();
                }, 800);
            }, 2500);
        };

        function renderInicio() {
            document.getElementById('main-app').innerHTML = `
                <div style="text-align:center; margin: 30px 0;">
                    <img src="${LOGO_URL}" style="width:80px; border-radius:50%; border: 1px solid #333;" onerror="this.style.display='none'">
                    <h2 style="margin-top:10px">¡Hola, Martín!</h2>
                </div>
                <div class="btn-tipo" onclick="setTipo('Carta')">🃏 MIS CARTAS</div>
                <div class="btn-tipo" onclick="setTipo('Figurita')">⚽ MIS FIGURITAS</div>
            `;
        }

        function setTipo(t) { tipoActual = t; renderMenu(); }

        function renderMenu() {
            const filtrados = db.filter(a => a.tipo === tipoActual);
            let html = `<button class="btn-back" onclick="renderInicio()">⬅ Volver</button>
                        <h3 style="margin: 5px 0 15px 0;">Sección ${tipoActual}s</h3>
                        <button class="btn-accion" style="background:#1b5e20" onclick="renderNuevoForm()">+ AGREGAR NUEVA</button><br><br>`;
            
            filtrados.forEach(a => {
                const totalTengo = a.tengo.length;
                const porcFaltante = Math.floor(((a.total - totalTengo) / a.total) * 100);
                const porcLleno = 100 - porcFaltante;

                html += `
                    <div class="album-card" onclick="verAlbum('${a.id}')">
                        <img src="${a.img || 'https://via.placeholder.com/55?text=Img'}" onerror="this.src='https://via.placeholder.com/55?text=Album'">
                        <div style="flex:1">
                            <strong style="font-size:15px">${a.nombre}</strong><br>
                            <small style="color:var(--red); font-size:11px">Falta el ${porcFaltante}% (${a.total - totalTengo} u.)</small>
                            <div class="prog-container"><div class="prog-fill" style="width:${porcLleno}%"></div></div>
                        </div>
                    </div>`;
            });
            document.getElementById('main-app').innerHTML = html;
        }

        function renderNuevoForm() {
            document.getElementById('main-app').innerHTML = `
                <button class="btn-back" onclick="renderMenu()">⬅ Volver</button>
                <div style="background:#111; padding:20px; border-radius:15px; border:1px solid #333">
                    <h4 style="margin-top:0">Nueva Colección</h4>
                    <input type="text" id="custom-nombre" placeholder="Nombre" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #444; color:white; border-radius:8px; box-sizing:border-box">
                    <input type="number" id="custom-total" placeholder="Cantidad" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #444; color:white; border-radius:8px; box-sizing:border-box">
                    <button class="btn-accion" style="background:var(--accent)" onclick="guardarPersonalizada()">CREAR</button>
                </div>`;
        }

        function guardarPersonalizada() {
            const nombre = document.getElementById('custom-nombre').value;
            const total = parseInt(document.getElementById('custom-total').value);
            if(!nombre || !total) return;
            db.push({ id: "c_" + Date.now(), nombre, total, tipo: tipoActual, img: "", tengo: [] });
            localStorage.setItem(DB_NAME, JSON.stringify(db));
            renderMenu();
        }

        function verAlbum(id) {
            const a = db.find(x => x.id === id);
            let html = `
                <div style="position:sticky; top:0; background:var(--bg); padding-bottom:10px; z-index:10; border-bottom:1px solid #222">
                    <button class="btn-back" onclick="renderMenu()">⬅ Volver</button>
                    <h3 style="margin:0">${a.nombre}</h3>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px">
                         <small style="color:var(--red)">Faltan: ${a.total - a.tengo.length}</small>
                         <small style="color:var(--accent)">Tengo: ${a.tengo.length}</small>
                    </div>
                    <button class="btn-share" onclick="compartirFaltantes('${a.id}')">📲 COMPARTIR FALTANTES</button>
                </div>
                <div class="grid">`;
            for(let i=1; i<=a.total; i++) {
                const clase = a.tengo.includes(i) ? 'tengo' : '';
                html += `<div class="nro ${clase}" id="card-${i}" onclick="toggle('${id}', ${i})">${i}</div>`;
            }
            html += `</div>`;
            document.getElementById('main-app').innerHTML = html;
            window.scrollTo(0,0);
        }

        function toggle(albumId, nro) {
            const a = db.find(x => x.id === albumId);
            const idx = a.tengo.indexOf(nro);
            const el = document.getElementById(`card-${nro}`);

            if(idx > -1) {
                a.tengo.splice(idx, 1);
                el.classList.remove('tengo');
            } else {
                a.tengo.push(nro);
                el.classList.add('tengo');
            }
            localStorage.setItem(DB_NAME, JSON.stringify(db));
            const txtFaltan = document.querySelector('small[style*="var(--red)"]');
            const txtTengo = document.querySelector('small[style*="var(--accent)"]');
            if(txtFaltan) txtFaltan.innerText = `Faltan: ${a.total - a.tengo.length}`;
            if(txtTengo) txtTengo.innerText = `Tengo: ${a.tengo.length}`;
        }

        function compartirFaltantes(id) {
            const a = db.find(x => x.id === id);
            const faltan = [];
            for(let i=1; i<=a.total; i++) { if(!a.tengo.includes(i)) faltan.push(i); }
            const texto = `¡Hola! Me faltan estas de *${a.nombre}*:\n\n` + faltan.join(", ");
            window.open("https://wa.me/?text=" + encodeURIComponent(texto), '_blank');
        }
    </script>
</body>
</html>
