<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App de Colecciones</title>
    <style>
        :root { --primary: #0288d1; --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #2e7d32; --whatsapp: #25d366; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; }
        .logo { font-size: 70px; margin-bottom: 20px; }
        
        #main-app { display: none; max-width: 500px; margin: auto; }
        .btn-tipo { background: var(--card); padding: 40px 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; font-size: 22px; font-weight: bold; cursor: pointer; border: 1px solid #333; }
        
        .album-card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #333; }
        .album-card img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; background: #222; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 15px; }
        .nro { background: #1e1e1e; padding: 15px 0; text-align: center; border-radius: 6px; color: #ff5252; border: 1px solid #444; font-weight: bold; cursor: pointer; }
        .nro.tengo { background: var(--accent); color: white; border-color: #fff; opacity: 0.6; }

        .btn-accion { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-share { background: var(--whatsapp); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-back { background: #444; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
        
        .section-title { background: #333; padding: 10px; border-radius: 5px; margin-top: 30px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo">🃏⚽</div>
        <h1 style="color:var(--primary)">MI COLECCIÓN</h1>
    </div>

    <div id="main-app"></div>

    <script>
        const CATALOGO = [
            { id: "f26", nombre: "FIFA 365 2026", total: 630, tipo: "Carta", img: "https://m.media-amazon.com/images/I/71C7x6y-G9L._AC_SL1500_.jpg" },
            { id: "ca24", nombre: "Copa América 2024", total: 430, tipo: "Figurita", img: "https://exitocol.vtexassets.com/arquivos/ids/22373752/Album-Copa-America-2024-Panini.jpg" }
        ];

        let db = JSON.parse(localStorage.getItem('colecciones_v4')) || [];
        let tipoActual = "";

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                renderInicio();
            }, 1500);
        };

        function renderInicio() {
            document.getElementById('main-app').innerHTML = `
                <h1 style="text-align:center; margin-top:50px">¿Qué vas a completar?</h1>
                <div class="btn-tipo" onclick="setTipo('Carta')">🃏 MIS CARTAS</div>
                <div class="btn-tipo" onclick="setTipo('Figurita')">⚽ MIS FIGURITAS</div>
            `;
        }

        function setTipo(t) { tipoActual = t; renderMenu(); }

        function renderMenu() {
            const filtrados = db.filter(a => a.tipo === tipoActual);
            let html = `<button class="btn-back" onclick="renderInicio()">⬅ Inicio</button>
                        <h2>${tipoActual}s</h2>
                        <button class="btn-accion" style="background:#1b5e20" onclick="renderNuevoForm()">+ AGREGAR NUEVA</button><br><br>`;
            
            filtrados.forEach(a => {
                html += `
                    <div class="album-card" onclick="verAlbum('${a.id}')">
                        <img src="${a.img || 'https://via.placeholder.com/70?text=Album'}">
                        <div style="flex:1">
                            <strong>${a.nombre}</strong><br>
                            <small style="color:#888">Faltan ${a.total - a.tengo.length} de ${a.total}</small>
                        </div>
                    </div>`;
            });
            document.getElementById('main-app').innerHTML = html;
        }

        function renderNuevoForm() {
            let html = `
                <button class="btn-back" onclick="renderMenu()">⬅ Volver</button>
                <div style="background:#252525; padding:20px; border-radius:15px; border:1px solid var(--primary); margin-bottom:20px">
                    <h3 style="margin:0 0 10px 0">Crear Manual</h3>
                    <input type="text" id="custom-nombre" placeholder="Nombre de la colección" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #444; color:white; border-radius:5px">
                    <input type="number" id="custom-total" placeholder="Cantidad total" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #444; color:white; border-radius:5px">
                    <button class="btn-accion" onclick="guardarPersonalizada()">CREAR ÁLBUM</button>
                </div>
                <h3 style="text-align:center; color:#666">O ELEGÍ DEL CATÁLOGO</h3>`;

            CATALOGO.filter(c => c.tipo === tipoActual).forEach(c => {
                html += `
                    <div class="album-card" onclick="agregarDelCatalogo('${c.id}')">
                        <img src="${c.img}">
                        <div><strong>${c.nombre}</strong><br><small>${c.total} ítems</small></div>
                    </div>`;
            });
            document.getElementById('main-app').innerHTML = html;
        }

        function guardarPersonalizada() {
            const nombre = document.getElementById('custom-nombre').value;
            const total = parseInt(document.getElementById('custom-total').value);
            if(!nombre || !total) return alert("Completá los datos");
            db.push({ id: "c_" + Date.now(), nombre, total, tipo: tipoActual, img: "", tengo: [] });
            localStorage.setItem('colecciones_v4', JSON.stringify(db));
            renderMenu();
        }

        function agregarDelCatalogo(id) {
            if(db.some(x => x.id === id)) return alert("Ya existe");
            db.push({...CATALOGO.find(c => c.id === id), tengo: []});
            localStorage.setItem('colecciones_v4', JSON.stringify(db));
            renderMenu();
        }

        function verAlbum(id) {
            const a = db.find(x => x.id === id);
            const faltan = [];
            const tengo = [];
            for(let i=1; i<=a.total; i++) {
                if(a.tengo.includes(i)) tengo.push(i);
                else faltan.push(i);
            }

            let html = `
                <div style="position:sticky; top:0; background:var(--bg); padding-bottom:10px; z-index:10">
                    <button class="btn-back" onclick="renderMenu()">⬅ Volver</button>
                    <h2 style="margin:0">${a.nombre}</h2>
                    <p style="color:#ff5252; margin: 5px 0;"><b>Faltan: ${faltan.length}</b></p>
                    <button class="btn-share" onclick="compartirFaltantes('${a.id}')">🟢 COMPARTIR FALTANTES</button>
                </div>

                <div class="section-title">NÚMEROS QUE ME FALTAN</div>
                <div class="grid">
                    ${faltan.map(n => `<div class="nro" onclick="toggle('${id}', ${n})">${n}</div>`).join('')}
                </div>`;

            if(tengo.length > 0) {
                html += `
                    <div class="section-title" style="background:#1b5e20; color:white">YA LAS TENGO (${tengo.length})</div>
                    <div class="grid" style="opacity:0.5">
                        ${tengo.map(n => `<div class="nro tengo" onclick="toggle('${id}', ${n})">${n}</div>`).join('')}
                    </div>`;
            }

            document.getElementById('main-app').innerHTML = html;
            window.scrollTo(0,0);
        }

        function toggle(id, n) {
            const a = db.find(x => x.id === id);
            const idx = a.tengo.indexOf(n);
            if(idx > -1) a.tengo.splice(idx, 1);
            else a.tengo.push(n);
            localStorage.setItem('colecciones_v4', JSON.stringify(db));
            verAlbum(id);
        }

        function compartirFaltantes(id) {
            const a = db.find(x => x.id === id);
            const faltan = [];
            for(let i=1; i<=a.total; i++) { if(!a.tengo.includes(i)) faltan.push(i); }
            if(faltan.length === 0) return alert("¡Álbum completo!");
            const texto = `¡Hola! Me faltan estas de *${a.nombre}*:\n\n` + faltan.join(", ");
            window.open("https://wa.me/?text=" + encodeURIComponent(texto), '_blank');
        }
    </script>
</body>
</html>
