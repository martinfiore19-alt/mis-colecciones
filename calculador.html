<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Calefacción - Martín Fiore</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .drop-zone { border: 3px dashed #3498db; padding: 40px; text-align: center; border-radius: 15px; background: #f0f9ff; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .drop-zone:hover { background: #e1f1fd; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background: #3498db; color: white; }
        .caldera-card { display: none; margin-top: 30px; padding: 20px; border-radius: 10px; background: #27ae60; color: white; text-align: center; }
        .badge { background: #f39c12; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculador Automático de Radiadores</h1>
    <p style="text-align: center;">Subí tu Excel con columnas: <b>Ambiente | Largo | Ancho | Alto</b></p>
    
    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <strong>Click aquí para cargar tu archivo Excel</strong>
        <input type="file" id="fileInput" accept=".xlsx, .xls" style="display:none">
    </div>

    <table id="resTable">
        <thead>
            <tr>
                <th>Ambiente</th>
                <th>Dimensiones</th>
                <th>Calorías</th>
                <th>Elementos</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>

    <div id="calderaBox" class="caldera-card">
        <h2 id="totalLabel"></h2>
        <p id="modelLabel" style="font-size: 1.2em; font-weight: bold;"></p>
    </div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, {header: 1});
            
            let totalKcal = 0;
            const body = document.getElementById('resBody');
            body.innerHTML = '';

            for(let i = 1; i < json.length; i++) {
                let nom = json[i][0] || `Ambiente ${i}`;
                let l = parseFloat(json[i][1]) || 0;
                let an = parseFloat(json[i][2]) || 0;
                let al = parseFloat(json[i][3]) || 2.6;

                if(l > 0 && an > 0) {
                    let kcal = Math.round((l * an * al) * 60);
                    let elem = Math.ceil(kcal / 150);
                    totalKcal += kcal;
                    body.innerHTML += `<tr><td>${nom}</td><td>${l}x${an}</td><td>${kcal}</td><td><span class="badge">${elem}</span></td></tr>`;
                }
            }

            document.getElementById('resTable').style.display = 'table';
            const box = document.getElementById('calderaBox');
            box.style.display = 'block';
            document.getElementById('totalLabel').innerText = `Total: ${totalKcal.toLocaleString()} kcal/h`;
            
            let finalDemand = totalKcal * 1.2;
            let model = finalDemand <= 22000 ? "24.000 kcal/h" : finalDemand <= 30000 ? "32.000 kcal/h" : "36.000+ kcal/h";
            document.getElementById('modelLabel').innerText = `Caldera recomendada: ${model}`;
        };
        reader.readAsArrayBuffer(file);
    });
</script>
</body>
</html>
